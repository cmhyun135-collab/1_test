<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 첫 번째 웹페이지</title>
    <style>
        body {
            /* 배경색: 연한 하늘색, 글자색: 진한 남색 */
            background-color: lightskyblue;
            color: navy;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            height: 100vh;
            
            /* 전체 내용을 화면 가운데에 오도록 정렬 */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            text-align: center;
        }

        h1 {
            /* 내 이름을 큰 글씨로 */
            font-size: 4rem;
            margin-bottom: 10px;
        }

        p.intro {
            /* 한 줄 자기소개 문장 */
            font-size: 1.5rem;
            margin-bottom: 40px;
            font-weight: 500;
        }

        .likes-section h3 {
            font-size: 1.2rem;
            margin-bottom: 15px;
        }

        ul {
            list-style-type: none;
            padding: 0;
            font-size: 1.2rem;
            display: inline-block;
            text-align: left; /* 목록 자체는 왼쪽 정렬하되 컨테이너 안에서 가운데 배치되게 함 */
        }

        li {
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>홍길동</h1>
        <p class="intro">매일매일 새로운 것을 배우는 것을 좋아하는 예비 개발자입니다.</p>
        
        <div class="likes-section">
            <h3>내가 좋아하는 것 3가지</h3>
            <ul>
                <li>💻 코딩하기</li>
                <li>🎵 음악 감상</li>
                <li>☕ 맛있는 커피 마시기</li>
            </ul>
        </div>
    </div>
</body>
</html>
